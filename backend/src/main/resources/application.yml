spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/careconnect}
    username: ${SPRING_DATASOURCE_USERNAME:careconnect}
    password: ${SPRING_DATASOURCE_PASSWORD:careconnect}
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
app:
  jwt-secret: ${APP_JWT_SECRET:local-development-secret-must-be-at-least-thirty-two-characters}
  jwt-expiration-ms: 86400000
  cors-origin: ${APP_CORS_ORIGIN:http://localhost:5174}
  password-strength: ${APP_PASSWORD_STRENGTH:10}
management:
  endpoints.web.exposure.include: health,info
  endpoint.health.show-details: never
