services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: careconnect
      POSTGRES_USER: careconnect
      POSTGRES_PASSWORD: careconnect
    ports: ["15432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careconnect -d careconnect"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/careconnect
      SPRING_DATASOURCE_USERNAME: careconnect
      SPRING_DATASOURCE_PASSWORD: careconnect
      APP_JWT_SECRET: change-this-demo-secret-to-a-very-long-value-123456789
    ports: ["8081:8080"]
    depends_on:
      db: { condition: service_healthy }
  frontend:
    build: ./frontend
    ports: ["5174:80"]
    depends_on: [backend]
volumes:
  postgres_data:
